<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator - College Project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-calculator"></i> Scientific Calculator</h1>
            <p>College Project - Advanced Mathematical Operations</p>
        </header>

        <div class="calculator">
            <!-- Display Screen -->
            <div class="display">
                <div class="previous-operand" id="previousOperand"></div>
                <div class="current-operand" id="currentOperand">0</div>
            </div>

            <!-- Buttons Grid -->
            <div class="buttons-grid">
                <!-- Row 1: Functions -->
                <button class="btn function" data-key="clear">C</button>
                <button class="btn function" data-key="clearEntry">CE</button>
                <button class="btn function" data-key="delete">⌫</button>
                <button class="btn function" data-key="divide">÷</button>

                <!-- Row 2: Scientific Functions -->
                <button class="btn scientific" data-key="sin">sin</button>
                <button class="btn scientific" data-key="cos">cos</button>
                <button class="btn scientific" data-key="tan">tan</button>
                <button class="btn scientific" data-key="log">log</button>

                <!-- Row 3: More Functions -->
                <button class="btn scientific" data-key="sqrt">√</button>
                <button class="btn scientific" data-key="power">x<sup>y</sup></button>
                <button class="btn scientific" data-key="factorial">n!</button>
                <button class="btn scientific" data-key="pi">π</button>

                <!-- Row 4: Numbers 7-9 & Multiply -->
                <button class="btn number" data-key="7">7</button>
                <button class="btn number" data-key="8">8</button>
                <button class="btn number" data-key="9">9</button>
                <button class="btn operation" data-key="multiply">×</button>

                <!-- Row 5: Numbers 4-6 & Subtract -->
                <button class="btn number" data-key="4">4</button>
                <button class="btn number" data-key="5">5</button>
                <button class="btn number" data-key="6">6</button>
                <button class="btn operation" data-key="subtract">-</button>

                <!-- Row 6: Numbers 1-3 & Add -->
                <button class="btn number" data-key="1">1</button>
                <button class="btn number" data-key="2">2</button>
                <button class="btn number" data-key="3">3</button>
                <button class="btn operation" data-key="add">+</button>

                <!-- Row 7: 0, Decimal, Equals -->
                <button class="btn number zero" data-key="0">0</button>
                <button class="btn number" data-key=".">.</button>
                <button class="btn equals" data-key="equals" rowspan="2">=</button>
            </div>

            <!-- Mode Toggle -->
            <div class="mode-toggle">
                <label class="toggle-switch">
                    <input type="checkbox" id="scientificMode">
                    <span class="slider"></span>
                    Scientific Mode
                </label>
            </div>
        </div>

        <footer>
            <p>Developed for College Project | <i class="fas fa-code"></i> HTML/CSS/JavaScript</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
